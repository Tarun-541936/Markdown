name: PR Quality Checks

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:

  quality-checks:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt

      - name: Run flake8
        run: |
          python -m flake8 . > flake8-report.txt 2>&1 || true

      - name: Run bandit
        run: |
          python -m bandit -r . > bandit-report.txt 2>&1 || true

      - name: Run pytest
        run: |
          python -m pytest > pytest-report.txt 2>&1 || true

      - name: Build PR comment
        run: |
          {
            echo "## CI Quality Report"
            echo ""
            echo "### Flake8 Results"
            echo '```'
            cat flake8-report.txt
            echo '```'
            echo ""
            echo "### Bandit Results"
            echo '```'
            cat bandit-report.txt
            echo '```'
            echo ""
            echo "### Pytest Results"
            echo '```'
            cat pytest-report.txt
            echo '```'
          } > comment.md

      - name: Post PR comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body-file comment.md